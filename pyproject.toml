[project]
name = "adaptive-traffic-signal-green-corridor"
version = "0.1.0"
description = "Adaptive traffic signal control with green corridor and emergency preemption"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # Computer vision — use headless build (no X11 GUI libs) inside container
    "opencv-python-headless>=4.10",
    "pillow>=9.0",
    # YOLOv8 — torch/torchvision are pinned to CPU-only builds so that
    # `uv sync` in GitHub Codespaces (no GPU) does not pull nvidia-*-cu12 wheels.
    # The pytorch-cpu index is declared in uv.toml; [tool.uv.sources] below
    # routes these two packages there. To switch to CUDA, remove the +cpu pins
    # and the sources entries, then update the index URL in uv.toml.
    "torch==2.6.0+cpu",
    "torchvision==0.21.0+cpu",
    "ultralytics>=8.3",
    # Arduino / serial hardware interface
    "pyserial>=3.5",
    # Web dashboard (Week 4)
    "flask>=3.0",
    # Numerical + data handling
    "numpy>=2.0",
    "pyyaml>=6.0",
    "kaggle>=2.0.0",
]

[project.optional-dependencies]
prediction = [
    # Optional LSTM / XGBoost predictor (Week 4)
    "scikit-learn>=1.5",
    "xgboost>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["control", "detection", "gui"]

[tool.uv.sources]
torch = [{ index = "pytorch-cpu" }]
torchvision = [{ index = "pytorch-cpu" }]

[[tool.uv.index]]
name = "pytorch-cpu"
url  = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I"]

[dependency-groups]
dev = [
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
