<!DOCTYPE html>
<html>

<head>
    <title>Live Traffic Feed</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a1a;
            color: #eee;
            margin: 0;
            padding: 24px;
        }

        h1 {
            margin-bottom: 6px;
        }

        a {
            color: #4fc3f7;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        #result-canvas {
            border: 5px solid #444;
            border-radius: 10px;
            width: 640px;
            height: 480px;
            background: #000;
            margin-top: 20px;
        }

        .status-bar {
            margin-top: 10px;
            font-size: 0.95em;
            color: #888;
            min-height: 1.4em;
        }

        .count-pill {
            display: none;
            background: #4caf50;
            color: #fff;
            border-radius: 20px;
            padding: 4px 18px;
            font-weight: bold;
            font-size: 1em;
            margin-top: 8px;
        }

        #start-btn {
            margin-top: 16px;
            padding: 12px 40px;
            font-size: 1em;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #start-btn:hover {
            background: #388e3c;
        }

        #start-btn:disabled {
            background: #555;
            cursor: default;
        }

        #stop-btn {
            margin-top: 16px;
            margin-left: 10px;
            padding: 12px 40px;
            font-size: 1em;
            background: #e53935;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: background 0.2s;
        }

        #stop-btn:hover {
            background: #b71c1c;
        }

        #error-msg {
            color: #ef5350;
            margin-top: 10px;
            font-size: 0.9em;
            min-height: 1.2em;
        }
    </style>
</head>

<body>
    <h1>🚦 Adaptive Traffic System — Live Feed</h1>
    <p><a href="/test">Test with uploaded images →</a> | <a href="/test_emergency">🚑 Emergency Classifier</a> | <a
            href="/test_traffic_prediction">📊 Traffic Predictor →</a></p>

    <div>
        <button id="start-btn" onclick="startCamera()">📷 Allow Camera &amp; Start Feed</button>
        <button id="stop-btn" onclick="stopCamera()">⏹ Stop Feed</button>
        <p id="error-msg"></p>
    </div>

    <!-- Hidden elements: raw webcam stream + capture surface -->
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>
    <canvas id="capture-canvas" width="640" height="480" style="display:none;"></canvas>

    <!-- Visible annotated output -->
    <canvas id="result-canvas" width="640" height="480"></canvas>

    <div class="status-bar" id="status">Click "Allow Camera" to begin.</div>
    <div class="count-pill" id="count-pill"></div>

    <script>
        const webcam = document.getElementById('webcam');
        const captureCanvas = document.getElementById('capture-canvas');
        const resultCanvas = document.getElementById('result-canvas');
        const statusEl = document.getElementById('status');
        const countPill = document.getElementById('count-pill');
        const errorMsg = document.getElementById('error-msg');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        const captureCtx = captureCanvas.getContext('2d');
        const resultCtx = resultCanvas.getContext('2d');

        let running = false;
        let rafHandle = null;
        let lastSend = 0;
        const INTERVAL_MS = 1000; // one YOLO inference per second

        async function startCamera() {
            errorMsg.textContent = '';
            startBtn.disabled = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'environment' },
                    audio: false,
                });
                webcam.srcObject = stream;
                await webcam.play();
                running = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                statusEl.textContent = 'Camera active — detecting vehicles…';
                rafHandle = requestAnimationFrame(captureLoop);
            } catch (err) {
                startBtn.disabled = false;
                errorMsg.textContent = `Camera error: ${err.message}`;
                statusEl.textContent = 'Permission denied or no camera available.';
            }
        }

        function stopCamera() {
            running = false;
            if (rafHandle) { cancelAnimationFrame(rafHandle); rafHandle = null; }
            if (webcam.srcObject) {
                webcam.srcObject.getTracks().forEach(t => t.stop());
                webcam.srcObject = null;
            }
            stopBtn.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.disabled = false;
            countPill.style.display = 'none';
            statusEl.textContent = 'Feed stopped.';
            // clear canvas
            resultCtx.fillStyle = '#000';
            resultCtx.fillRect(0, 0, 640, 480);
        }

        let inferenceInFlight = false;

        function captureLoop(timestamp) {
            if (!running) return;
            rafHandle = requestAnimationFrame(captureLoop);

            if (timestamp - lastSend < INTERVAL_MS || inferenceInFlight) return;
            lastSend = timestamp;
            inferenceInFlight = true;

            // Snapshot the current webcam frame
            captureCtx.drawImage(webcam, 0, 0, 640, 480);

            captureCanvas.toBlob(async (blob) => {
                if (!blob) { inferenceInFlight = false; return; }

                const fd = new FormData();
                fd.append('frame', blob, 'frame.jpg');

                try {
                    const resp = await fetch('/predict_frame', { method: 'POST', body: fd });
                    if (!resp.ok) {
                        statusEl.textContent = `Server error ${resp.status}`;
                        return;
                    }
                    const data = await resp.json();

                    const img = new Image();
                    img.onload = () => resultCtx.drawImage(img, 0, 0, 640, 480);
                    img.src = 'data:image/jpeg;base64,' + data.annotated;

                    countPill.textContent = `Vehicles detected: ${data.vehicle_count}`;
                    countPill.style.display = 'inline-block';
                    statusEl.textContent = 'Live ✓';
                } catch (e) {
                    statusEl.textContent = 'Inference request failed.';
                } finally {
                    inferenceInFlight = false;
                }
            }, 'image/jpeg', 0.85);
        }
    </script>
</body>

</html>
